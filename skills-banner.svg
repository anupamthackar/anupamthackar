<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="cardGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="cardGlass2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B7BFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B7BFF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00F5FF" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#7B7BFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7B7BFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F5FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip1"><rect x="0" y="0" width="140" height="64" rx="8"/></clipPath>
    <clipPath id="cardClip2"><rect x="0" y="0" width="140" height="64" rx="8"/></clipPath>
